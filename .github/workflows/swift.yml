name: Swift CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  linux:
    name: Linux (Swift ${{ matrix.swift }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        swift: ['6.0', '6.3']
    container: swift:${{ matrix.swift }}
    steps:
      - uses: actions/checkout@v7

      - name: Build
        run: swift build --build-tests

      - name: Test
        run: swift test

      - name: Build examples
        working-directory: Examples
        run: swift build

  macos:
    name: macOS
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build --build-tests

      - name: Test
        run: swift test

      - name: Build for iOS
        run: >
          xcodebuild build
          -scheme Ipregistry
          -destination 'generic/platform=iOS'
          CODE_SIGNING_ALLOWED=NO
